version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: shopora_web_dev
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      db-seed:
        condition: service_completed_successfully

  # Optional database seeder runs after migration completes successfully
  db-seed:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: shopora_db_seed
    command: npm run db:seed
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    depends_on:
      mysql:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - shopora_net
